<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Dance Challenge</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        #header {
            position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100;
            text-shadow: 0 0 10px #000; font-weight: 900; font-size: 18px; color: #fff;
        }

        .battle-container { display: flex; width: 100vw; height: 100vh; }

        .side {
            flex: 1; position: relative; border: 1px solid #333;
            display: flex; flex-direction: column; justify-content: flex-end;
            background: #111; /* Koulè fon si videyo a poko chaje */
        }

        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; cursor: pointer;
        }

        /* Ti icon play ki parèt nan mitan videyo a */
        .play-hint {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; font-size: 40px; opacity: 0.5; pointer-events: none;
        }

        .vote-area {
            position: relative; z-index: 10; padding: 30px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            text-align: center;
        }

        .vote-btn {
            background: #ff0050; border: none; color: #fff; padding: 15px 0;
            width: 90%; border-radius: 10px; font-weight: bold; font-size: 16px;
            margin-bottom: 10px; cursor: pointer; text-transform: uppercase;
        }
        
        .side-right .vote-btn { background: #00f2ea; color: #000; }

        .vote-count { font-size: 30px; font-weight: 900; display: block; }

        .vs-tag {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; background: #fff; color: #000; font-weight: 900;
            padding: 10px; border-radius: 50%; border: 3px solid #ff0050;
        }

        .progress-bar {
            position: absolute; bottom: 0; height: 8px; width: 100%;
            display: flex; z-index: 100;
        }
        #bar-l { width: 50%; background: #ff0050; transition: 0.3s; }
        #bar-r { width: 50%; background: #00f2ea; transition: 0.3s; }
    </style>
</head>
<body>

    <div id="header">KLIIKE SOU VIDEO POU PLAY</div>
    <div class="vs-tag">VS</div>

    <div class="battle-container">
        <div class="side side-left">
            <video id="vid1" loop playsinline onclick="togglePlay(this)">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            <div class="play-hint" id="hint1">▶</div>
            <div class="vote-area">
                <span class="vote-count" id="count-l">0</span>
                <button class="vote-btn" onclick="addVote('l')">VOTE GÒCH</button>
            </div>
        </div>

        <div class="side side-right">
            <video id="vid2" loop playsinline onclick="togglePlay(this)">
                <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
            </video>
            <div class="play-hint" id="hint2">▶</div>
            <div class="vote-area">
                <span class="vote-count" id="count-r">0</span>
                <button class="vote-btn" onclick="addVote('r')">VOTE DWAT</button>
            </div>
        </div>
    </div>

    <div class="progress-bar">
        <div id="bar-l"></div>
        <div id="bar-r"></div>
    </div>

<script>
    let vL = 0;
    let vR = 0;

    // Fonksyon pou jwe oswa kanpe videyo a
    function togglePlay(video) {
        const hint = video.id === 'vid1' ? document.getElementById('hint1') : document.getElementById('hint2');
        if (video.paused) {
            video.play();
            hint.style.display = 'none';
        } else {
            video.pause();
            hint.style.display = 'block';
        }
    }

    // Fonksyon vòt
    function addVote(side) {
        if(side === 'l') {
            vL++;
            document.getElementById('count-l').innerText = vL;
        } else {
            vR++;
            document.getElementById('count-r').innerText = vR;
        }
        
        let total = vL + vR;
        let pL = (vL / total) * 100;
        let pR = (vR / total) * 100;
        
        document.getElementById('bar-l').style.width = pL + "%";
        document.getElementById('bar-r').style.width = pR + "%";
    }
</script>
</body>
</html>
