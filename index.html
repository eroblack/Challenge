<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Battle Vòt</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Bò Gòch: 2 Kandida yo */
        .sidebar {
            width: 35%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            border-right: 3px solid #222;
            background: #0a0a0a;
        }

        .candidate-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .thumb-container {
            flex: 1;
            position: relative;
            cursor: pointer;
            border: 4px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }

        .candidate-box.active .thumb-container { border-color: #ff0050; box-shadow: 0 0 20px rgba(255, 0, 80, 0.4); }

        .thumb-container iframe { width: 100%; height: 100%; pointer-events: none; }

        /* Bouton Vote */
        .vote-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111;
            padding: 10px;
            border-radius: 8px;
        }

        .vote-btn {
            background: #ff0050;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .vote-btn:active { transform: scale(0.95); }

        .score-display { font-size: 24px; font-weight: bold; color: #00f2ea; }

        /* Bò Dwat: Gwo Ekran */
        .main-view {
            flex: 1;
            background: #000;
            display: flex;
            position: relative;
        }

        #main-video-frame { width: 100%; height: 100%; border: none; }

        .battle-tag {
            position: absolute; top: 20px; right: 20px;
            background: linear-gradient(90deg, #ff0050, #00f2ea);
            padding: 8px 20px; border-radius: 30px; font-size: 14px;
            font-weight: bold; z-index: 10;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="candidate-box active" id="box-1">
            <div class="thumb-container" onclick="changeVideo('UHZNk5aVw-8', 'box-1')">
                <iframe src="https://www.youtube.com/embed/UHZNk5aVw-8?controls=0&mute=1" frameborder="0"></iframe>
            </div>
            <div class="vote-section">
                <button class="vote-btn" onclick="addVote('score-1')">Vote</button>
                <span class="score-display" id="score-1">0</span>
            </div>
        </div>
        
        <div class="candidate-box" id="box-2">
            <div class="thumb-container" onclick="changeVideo('623Z4Ia9Xzo', 'box-2')">
                <iframe src="https://www.youtube.com/embed/623Z4Ia9Xzo?controls=0&mute=1" frameborder="0"></iframe>
            </div>
            <div class="vote-section">
                <button class="vote-btn" style="background:#00f2ea; color:#000;" onclick="addVote('score-2')">Vote</button>
                <span class="score-display" id="score-2">0</span>
            </div>
        </div>
    </div>

    <div class="main-view">
        <div class="battle-tag">EROBLACK CHALLENGE LIVE</div>
        <iframe id="main-video-frame" 
                src="https://www.youtube.com/embed/UHZNk5aVw-8?autoplay=1&mute=0&loop=1&playlist=UHZNk5aVw-8" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
        </iframe>
    </div>

    <script>
        // Fonksyon pou chanje videyo
        function changeVideo(videoId, boxId) {
            const mainFrame = document.getElementById('main-video-frame');
            mainFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&loop=1&playlist=${videoId}`;

            // Mete vizyèl bò gòch la "active"
            document.querySelectorAll('.candidate-box').forEach(b => b.classList.remove('active'));
            document.getElementById(boxId).classList.add('active');
        }

        // Fonksyon pou vòt yo
        function addVote(scoreId) {
            const scoreEl = document.getElementById(scoreId);
            let currentScore = parseInt(scoreEl.innerText);
            scoreEl.innerText = currentScore + 1;
            
            // Ti animasyon lè score la chanje
            scoreEl.style.transform = "scale(1.3)";
            setTimeout(() => scoreEl.style.transform = "scale(1)", 100);
        }
    </script>

</body>
</html>
