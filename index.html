<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Challenge Live</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 30%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            border-right: 3px solid #222;
            background: #0a0a0a;
            z-index: 20;
        }

        .candidate-box { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .thumb-container {
            flex: 1; position: relative; cursor: pointer; border: 4px solid #333;
            border-radius: 12px; overflow: hidden; transition: 0.3s;
        }
        .candidate-box.active .thumb-container { border-color: #ff0050; box-shadow: 0 0 15px #ff0050; }
        .thumb-container iframe { width: 100%; height: 100%; pointer-events: none; }

        /* Main View */
        .main-view { flex: 1; background: #000; display: flex; position: relative; flex-direction: column; }
        #main-video-frame { width: 100%; height: 100%; border: none; }

        /* Header */
        .header-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 8px; z-index: 100;
        }
        .live-status {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0, 0, 0, 0.7); padding: 8px 15px;
            border-radius: 50px; border: 1px solid #ff0000; width: fit-content;
        }
        .live-dot { width: 10px; height: 10px; background: #ff0000; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        /* Display Non Kandida */
        #current-candidate-name {
            background: #ff0050; color: white; padding: 5px 15px;
            font-size: 18px; border-radius: 5px; margin-top: 5px;
            display: inline-block; width: fit-content; text-transform: uppercase;
        }

        .sponsor-bar {
            background: rgba(255, 0, 80, 0.2); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 15px; border-radius: 5px; overflow: hidden; width: 250px;
        }
        .sponsor-track { display: flex; white-space: nowrap; animation: scroll-text 10s linear infinite; }
        .sponsor-item { font-size: 12px; color: #00f2ea; margin-right: 30px; font-weight: bold; }
        @keyframes scroll-text { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .live-clock { font-family: 'Arial', sans-serif; font-size: 12px; color: #00f2ea; padding-left: 5px; font-weight: bold; }

        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 5px; background: #111; border-radius: 5px; }
        .score-val { color: #00f2ea; font-size: 20px; }
        .candidate-name-tag { font-size: 14px; color: #00f2ea; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="candidate-box" id="box-1">
            <div id="display-name-1" class="candidate-name-tag">Kandida 1</div>
            <div class="thumb-container" onclick="changeVideo('UHZNk5aVw-8', 'box-1', 1)">
                <iframe src="https://www.youtube.com/embed/UHZNk5aVw-8?controls=0&mute=1" frameborder="0"></iframe>
            </div>
            <div class="score-row">
                <span>VÒT:</span>
                <span class="score-val" id="score-1">0</span>
            </div>
        </div>
        
        <div class="candidate-box" id="box-2">
            <div id="display-name-2" class="candidate-name-tag">Kandida 2</div>
            <div class="thumb-container" onclick="changeVideo('623Z4Ia9Xzo', 'box-2', 2)">
                <iframe src="https://www.youtube.com/embed/623Z4Ia9Xzo?controls=0&mute=1" frameborder="0"></iframe>
            </div>
            <div class="score-row">
                <span>VÒT:</span>
                <span class="score-val" id="score-2">0</span>
            </div>
        </div>
    </div>

    <div class="main-view">
        <div class="header-container">
            <div class="live-status">
                <div class="live-dot"></div>
                <span class="live-text">🔴 LIVE • EROBLACK CHALLENGE</span>
            </div>
            
            <div id="current-candidate-name">CHWAZI YON KANDIDA</div>

            <div class="sponsor-bar">
                <div class="sponsor-track">
                    <span class="sponsor-item">⭐ SPONSOR: EROBLACK SHOP</span>
                    <span class="sponsor-item">🔥 BOOST PA OU A</span>
                </div>
            </div>
            <div id="current-date-time" class="live-clock"></div>
        </div>

        <iframe id="main-video-frame" src="about:blank" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        // Memwa pou kenbe non yo
        let candidateNames = {
            "1": "Kandida 1",
            "2": "Kandida 2"
        };

        // 1. RESEVWA NON (Soti nan Java NK1, NK2)
        function updateNon(id, non) {
            candidateNames[id] = non;
            let el = document.getElementById('display-name-' + id);
            if(el) el.innerText = non;
        }

        // 2. RESEVWA VÒT (Soti nan Java VK1, VK2)
        function updateVot(id, kantite) {
            let scoreEl = document.getElementById('score-' + id);
            if(scoreEl) {
                scoreEl.innerText = kantite;
                scoreEl.style.color = "#ff0050";
                setTimeout(() => scoreEl.style.color = "#00f2ea", 300);
            }
        }

        function changeVideo(videoId, boxId, candidateNum) {
            const mainFrame = document.getElementById('main-video-frame');
            mainFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&loop=1&playlist=${videoId}`;

            // Sèvi ak non ki soti nan memwa (sa Java te voye a)
            document.getElementById('current-candidate-name').innerText = candidateNames[candidateNum];

            document.querySelectorAll('.candidate-box').forEach(b => b.classList.remove('active'));
            document.getElementById(boxId).classList.add('active');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('current-date-time').innerText = now.toLocaleDateString('en-GB') + " — " + now.toLocaleTimeString('en-GB', { hour12: false });
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
