<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Dance Duel</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* Tit anlè a */
        #header {
            position: absolute; top: 10px; width: 100%; text-align: center; z-index: 100;
            text-shadow: 0 0 10px #f00; font-weight: 900; font-size: 20px; letter-spacing: 2px;
        }

        /* Veso pou videyo yo */
        .battle-container { display: flex; width: 100vw; height: 100vh; }

        .side {
            flex: 1; position: relative; border: 1px solid #222;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
        }

        /* Interface vòt la */
        .vote-area {
            position: relative; z-index: 10; padding: 20px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            text-align: center;
        }

        .vote-btn {
            background: #f00; border: none; color: #fff; padding: 12px 0;
            width: 100%; border-radius: 50px; font-weight: bold; font-size: 16px;
            margin-bottom: 10px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }
        
        .side-right .vote-btn { background: #008cff; box-shadow: 0 0 15px rgba(0,140,255,0.5); }

        .vote-count { font-size: 24px; font-weight: 900; margin-top: 5px; }

        /* VS nan mitan an */
        .vs-tag {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 50; background: #fff; color: #000; font-weight: 900;
            padding: 8px; border-radius: 50%; border: 3px solid #f00; font-style: italic;
        }

        /* Bar Progresyon anba a */
        .progress-container {
            position: absolute; bottom: 0; width: 100%; height: 8px;
            display: flex; z-index: 100; background: #333;
        }
        #bar-left { width: 50%; background: #f00; transition: 0.5s; }
        #bar-right { width: 50%; background: #008cff; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="header">DANCE CHALLENGE VOTE</div>
    <div class="vs-tag">VS</div>

    <div class="battle-container">
        <div class="side side-left">
            <video id="vid1" loop muted autoplay playsinline>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            <div class="vote-area">
                <button class="vote-btn" onclick="vote('left')">VOTE GÒCH</button>
                <div class="vote-count" id="count-left">0</div>
                <div style="font-size: 12px; color: #aaa;">@TeamWouj</div>
            </div>
        </div>

        <div class="side side-right">
            <video id="vid2" loop muted autoplay playsinline>
                <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
            </video>
            <div class="vote-area">
                <button class="vote-btn" onclick="vote('right')">VOTE DWAT</button>
                <div class="vote-count" id="count-right">0</div>
                <div style="font-size: 12px; color: #aaa;">@TeamBle</div>
            </div>
        </div>
    </div>

    <div class="progress-container">
        <div id="bar-left"></div>
        <div id="bar-right"></div>
    </div>

    <script>
        let votesLeft = 0;
        let votesRight = 0;

        function vote(side) {
            if(side === 'left') {
                votesLeft++;
                document.getElementById('count-left').innerText = votesLeft;
            } else {
                votesRight++;
                document.getElementById('count-right').innerText = votesRight;
            }
            updateBar();
            
            // Si w nan Sketchware, ou ka voye done yo bay App la
            if (window.Android) {
                window.Android.voyeDone("vòt", side);
            }
        }

        function updateBar() {
            let total = votesLeft + votesRight;
            if(total === 0) return;
            
            let pLeft = (votesLeft / total) * 100;
            let pRight = (votesRight / total) * 100;
            
            document.getElementById('bar-left').style.width = pLeft + "%";
            document.getElementById('bar-right').style.width = pRight + "%";
        }
        
        // Pou rann videyo yo senkronize lè yo kòmanse
        document.addEventListener('click', () => {
            document.getElementById('vid1').play();
            document.getElementById('vid2').play();
        }, {once: true});
    </script>
</body>
</html>
