<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Tap Battle - AutoPlay</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        /* Kontè vòt */
        .scoreboard {
            position: absolute; top: 20px; width: 100%; display: flex; 
            flex-direction: column; align-items: center; z-index: 100; pointer-events: none;
        }
        .score-box {
            background: rgba(0, 0, 0, 0.6); padding: 10px 25px; border-radius: 30px;
            display: flex; gap: 20px; border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }
        .score { font-size: 35px; font-weight: 900; min-width: 70px; text-align: center; }
        #score-l { color: #ff0050; text-shadow: 0 0 10px #ff0050; }
        #score-r { color: #00f2ea; text-shadow: 0 0 10px #00f2ea; }
        .vs-mid { font-size: 20px; color: #fff; align-self: center; }

        .progress-bar { width: 180px; height: 6px; background: #333; border-radius: 10px; margin-top: 8px; display: flex; overflow: hidden; }
        #bar-l { width: 50%; background: #ff0050; transition: 0.3s; }
        #bar-r { width: 50%; background: #00f2ea; transition: 0.3s; }

        /* Container videyo */
        .battle-container { display: flex; width: 100vw; height: 100vh; }
        .side { flex: 1; position: relative; overflow: hidden; }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Bouton pou limen son */
        .mute-btn {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 110; background: rgba(0,0,0,0.5); border: 2px solid #fff;
            color: #fff; padding: 10px; border-radius: 50%; cursor: pointer;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: 0.3s;
        }
        .active-sound { background: #fff; color: #000; box-shadow: 0 0 15px #fff; }

        /* Efè Tap */
        .tap-effect {
            position: absolute; width: 70px; height: 70px; border-radius: 50%;
            pointer-events: none; transform: translate(-50%, -50%) scale(0);
            animation: tapAnim 0.4s ease-out; z-index: 20;
        }
        @keyframes tapAnim {
            from { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            to { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }

        .user-tag {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            z-index: 10; font-size: 12px; opacity: 0.8; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="score-box">
            <span id="score-l" class="score">0</span>
            <span class="vs-mid">VS</span>
            <span id="score-r" class="score">0</span>
        </div>
        <div class="progress-bar">
            <div id="bar-l"></div>
            <div id="bar-r"></div>
        </div>
    </div>

    <div class="battle-container">
        <div class="side" id="left-side" onclick="handleTap(event, 'l')">
            <video id="vid1" loop muted autoplay playsinline>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            <button class="mute-btn" onclick="toggleAudio('vid1', this, event)">🔇</button>
            <div class="user-tag">@TEAM_RED</div>
        </div>

        <div class="side" id="right-side" onclick="handleTap(event, 'r')">
            <video id="vid2" loop muted autoplay playsinline>
                <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
            </video>
            <button class="mute-btn" onclick="toggleAudio('vid2', this, event)">🔇</button>
            <div class="user-tag">@TEAM_BLUE</div>
        </div>
    </div>

<script>
    let vL = 0;
    let vR = 0;

    // Jere Vòt lè moun nan tape
    function handleTap(event, side) {
        if(side === 'l') {
            vL++;
            document.getElementById('score-l').innerText = vL;
            createEffect(event, '#ff0050');
        } else {
            vR++;
            document.getElementById('score-r').innerText = vR;
            createEffect(event, '#00f2ea');
        }

        // Mizajou bar la
        let total = vL + vR;
        document.getElementById('bar-l').style.width = ((vL / total) * 100) + "%";
        document.getElementById('bar-r').style.width = ((vR / total) * 100) + "%";
    }

    // Jere Son an (Yonn mouri, lòt la bay son)
    function toggleAudio(vidId, btn, event) {
        event.stopPropagation(); // Pou klike sou bouton son an pa konte kòm yon vòt
        
        const v1 = document.getElementById('vid1');
        const v2 = document.getElementById('vid2');
        const targetVid = document.getElementById(vidId);
        const allBtns = document.querySelectorAll('.mute-btn');

        // Reset tout bouton ak son
        allBtns.forEach(b => { b.innerText = '🔇'; b.classList.remove('active-sound'); });
        
        if (targetVid.muted) {
            v1.muted = true;
            v2.muted = true;
            targetVid.muted = false;
            btn.innerText = '🔊';
            btn.classList.add('active-sound');
        } else {
            targetVid.muted = true;
            btn.innerText = '🔇';
        }
    }

    function createEffect(e, color) {
        const side = e.currentTarget;
        const circle = document.createElement('div');
        circle.className = 'tap-effect';
        circle.style.backgroundColor = color;
        const rect = side.getBoundingClientRect();
        circle.style.left = (e.clientX - rect.left) + 'px';
        circle.style.top = (e.clientY - rect.top) + 'px';
        side.appendChild(circle);
        setTimeout(() => circle.remove(), 400);
    }
</script>
</body>
</html>
