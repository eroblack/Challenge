<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Battle V3</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        /* Scoreboard ki byen vizib anlè */
        .scoreboard {
            position: absolute; top: 10px; width: 100%; display: flex; 
            flex-direction: column; align-items: center; z-index: 100; pointer-events: none;
        }
        .score-box {
            background: rgba(0, 0, 0, 0.8); padding: 15px 30px; border-radius: 50px;
            display: flex; gap: 30px; border: 2px solid #fff;
        }
        .score { font-size: 45px; font-weight: 900; min-width: 80px; text-align: center; }
        #score-l { color: #ff0050; text-shadow: 0 0 15px #ff0050; }
        #score-r { color: #00f2ea; text-shadow: 0 0 15px #00f2ea; }
        .vs-mid { font-size: 25px; color: #fff; align-self: center; }

        /* Frame Videyo yo */
        .battle-container { display: flex; width: 100vw; height: 100vh; }
        
        .side { 
            flex: 1; position: relative; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        /* Koulè background pou w ka wè frame yo menm si video pa chaje */
        #left-side { background: #300010; border-right: 2px solid #fff; }
        #right-side { background: #001030; }

        video { width: 100%; height: 100%; object-fit: cover; position: absolute; }

        /* Bouton Audio */
        .mute-btn {
            position: absolute; bottom: 50px; z-index: 110; 
            background: #fff; color: #000; border: none;
            width: 60px; height: 60px; border-radius: 50%; font-size: 25px;
            font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* Efè Tap blan ki vizib anpil */
        .tap-effect {
            position: absolute; width: 100px; height: 100px; background: rgba(255,255,255,0.8);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%) scale(0);
            animation: tapAnim 0.3s ease-out; z-index: 150;
        }
        @keyframes tapAnim {
            from { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            to { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="score-box">
            <span id="score-l" class="score">0</span>
            <span class="vs-mid">VS</span>
            <span id="score-r" class="score">0</span>
        </div>
    </div>

    <div class="battle-container">
        <div class="side" id="left-side" onclick="handleTap(event, 'l')">
            <video id="vid1" loop muted autoplay playsinline>
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            </video>
            <button class="mute-btn" onclick="toggleAudio('vid1', event)">🔇</button>
        </div>

        <div class="side" id="right-side" onclick="handleTap(event, 'r')">
            <video id="vid2" loop muted autoplay playsinline>
                <source src="https://www.w3schools.com/html/movie.mp4" type="video/mp4">
            </video>
            <button class="mute-btn" onclick="toggleAudio('vid2', event)">🔇</button>
        </div>
    </div>

<script>
    let vL = 0;
    let vR = 0;

    function handleTap(e, side) {
        if(side === 'l') {
            vL++;
            document.getElementById('score-l').innerText = vL;
        } else {
            vR++;
            document.getElementById('score-r').innerText = vR;
        }
        createEffect(e);
        
        // Fòse videyo jwe si yo te kanpe
        document.getElementById('vid1').play();
        document.getElementById('vid2').play();
    }

    function toggleAudio(vidId, e) {
        e.stopPropagation(); // Anpeche vòt lè w klike sou son
        const v1 = document.getElementById('vid1');
        const v2 = document.getElementById('vid2');
        const target = document.getElementById(vidId);
        
        v1.muted = true;
        v2.muted = true;
        target.muted = false;
        
        // Ti alèt pou konnen son an chanje
        console.log("Son aktive pou: " + vidId);
    }

    function createEffect(e) {
        const circle = document.createElement('div');
        circle.className = 'tap-effect';
        circle.style.left = e.clientX + 'px';
        circle.style.top = e.clientY + 'px';
        document.body.appendChild(circle);
        setTimeout(() => circle.remove(), 300);
    }
</script>
</body>
</html>
