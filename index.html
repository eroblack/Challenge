<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Video Selector</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Bò Gòch: Ti videyo yo */
        .sidebar {
            width: 30%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 10px;
            border-right: 2px solid #333;
            background: #111;
        }

        .thumb-container {
            flex: 1;
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
        }

        .thumb-container:hover, .thumb-container.active {
            border-color: #ff0050;
            transform: scale(1.02);
        }

        .thumb-container iframe {
            width: 100%;
            height: 100%;
            pointer-events: none; /* Anpeche klike anndan iframe a bò gòch la */
        }

        /* Bò Dwat: Gwo videyo a */
        .main-view {
            flex: 1;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        #main-video-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .overlay-text {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="thumb-container active" onclick="changeVideo('UHZNk5aVw-8', this)">
            <iframe src="https://www.youtube.com/embed/UHZNk5aVw-8?controls=0&mute=1" frameborder="0"></iframe>
        </div>
        
        <div class="thumb-container" onclick="changeVideo('623Z4Ia9Xzo', this)">
            <iframe src="https://www.youtube.com/embed/623Z4Ia9Xzo?controls=0&mute=1" frameborder="0"></iframe>
        </div>

        <div class="thumb-container" onclick="changeVideo('W9nZ6u15yis', this)">
            <iframe src="https://www.youtube.com/embed/W9nZ6u15yis?controls=0&mute=1" frameborder="0"></iframe>
        </div>
    </div>

    <div class="main-view">
        <div class="overlay-text">Eroblack Challenge Live</div>
        <iframe id="main-video-frame" 
                src="https://www.youtube.com/embed/UHZNk5aVw-8?autoplay=1&mute=0&loop=1&playlist=UHZNk5aVw-8" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
        </iframe>
    </div>

    <script>
        function changeVideo(videoId, element) {
            // Chanje videyo nan gwo frame nan
            const mainFrame = document.getElementById('main-video-frame');
            mainFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&loop=1&playlist=${videoId}`;

            // Mete klas "active" la sou sa nou klike a
            const thumbs = document.querySelectorAll('.thumb-container');
            thumbs.forEach(t => t.classList.remove('active'));
            element.classList.add('active');
        }
    </script>

</body>
</html>
