<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Challenge Live</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar {
            width: 30%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 15px;
            border-right: 3px solid #222;
            background: #0a0a0a;
            z-index: 20;
        }

        .candidate-box { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .thumb-container {
            flex: 1; position: relative; cursor: pointer; border: 4px solid #333;
            border-radius: 12px; overflow: hidden; transition: 0.3s;
        }
        .candidate-box.active .thumb-container { border-color: #ff0050; box-shadow: 0 0 15px #ff0050; }
        .thumb-container iframe { width: 100%; height: 100%; pointer-events: none; }

        /* Main View */
        .main-view { flex: 1; background: #000; display: flex; position: relative; flex-direction: column; }
        #main-video-frame { width: 100%; height: 100%; border: none; }

        /* Header */
        .header-container {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 8px; z-index: 100;
        }
        .live-status {
            display: flex; align-items: center; gap: 10px;
            background: rgba(0, 0, 0, 0.7); padding: 8px 15px;
            border-radius: 50px; border: 1px solid #ff0000; width: fit-content;
        }
        .live-dot { width: 10px; height: 10px; background: #ff0000; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        /* Display Non Kandida */
        #current-candidate-name {
            background: #ff0050; color: white; padding: 5px 15px;
            font-size: 18px; border-radius: 5px; margin-top: 5px;
            display: inline-block; width: fit-content; text-transform: uppercase;
        }

        .sponsor-bar {
            background: rgba(255, 0, 80, 0.2); backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px 15px; border-radius: 5px; overflow: hidden; width: 250px;
        }
        .sponsor-track { display: flex; white-space: nowrap; animation: scroll-text 10s linear infinite; }
        .sponsor-item { font-size: 12px; color: #00f2ea; margin-right: 30px; font-weight: bold; }
        @keyframes scroll-text { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        .live-clock { font-family: 'Arial', sans-serif; font-size: 12px; color: #00f2ea; padding-left: 5px; font-weight: bold; }

        /* Mega Vote Panel (Kache pa defo) */
        .mega-vote-panel {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px);
            padding: 15px; border-radius: 15px; border: 2px solid #ff0050;
            display: none; flex-direction: column; gap: 10px; width: 240px;
            z-index: 1000; box-shadow: 0 0 20px rgba(255, 0, 80, 0.4);
        }
        .panel-header { display: flex; justify-content: space-between; align-items: center; }
        .btn-close { background: #444; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; }
        
        .vote-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .btn-multi {
            background: #222; color: #fff; border: 1px solid #444;
            padding: 8px 4px; border-radius: 5px; font-size: 11px; cursor: pointer;
        }
        .btn-multi:hover { background: #ff0050; }

        .score-row { display: flex; justify-content: space-between; align-items: center; padding: 5px; background: #111; border-radius: 5px; }
        .score-val { color: #00f2ea; font-size: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="candidate-box" id="box-1">
            <div class="thumb-container" onclick="changeVideo('UHZNk5aVw-8', 'box-1', 'Kandida Nimewo 1')">
                <iframe src="https://www.youtube.com/embed/UHZNk5aVw-8?controls=0&mute=1" frameborder="0"></iframe>
            </div>
            <div class="score-row">
                <span>VÒT:</span>
                <span class="score-val" id="score-1">0</span>
            </div>
        </div>
        
        <div class="candidate-box" id="box-2">
            <div class="thumb-container" onclick="changeVideo('623Z4Ia9Xzo', 'box-2', 'Kandida Nimewo 2')">
                <iframe src="https://www.youtube.com/embed/623Z4Ia9Xzo?controls=0&mute=1" frameborder="0"></iframe>
            </div>
            <div class="score-row">
                <span>VÒT:</span>
                <span class="score-val" id="score-2">0</span>
            </div>
        </div>
    </div>

    <div class="main-view">
        <div class="header-container">
            <div class="live-status">
                <div class="live-dot"></div>
                <span class="live-text">🔴 LIVE • EROBLACK CHALLENGE</span>
            </div>
            
            <div id="current-candidate-name">CHWAZI YON KANDIDA</div>

            <div class="sponsor-bar">
                <div class="sponsor-track">
                    <span class="sponsor-item">⭐ SPONSOR: EROBLACK SHOP</span>
                    <span class="sponsor-item">🔥 BOOST PA OU A</span>
                </div>
            </div>
            <div id="current-date-time" class="live-clock"></div>
        </div>

        <iframe id="main-video-frame" src="about:blank" allow="autoplay; encrypted-media" allowfullscreen></iframe>

        <div class="mega-vote-panel" id="vote-panel">
            <div class="panel-header">
                <span style="font-size: 10px; color: #aaa;">BOOST VÒT</span>
                <button class="btn-close" onclick="togglePanel(false)">X</button>
            </div>
            <div class="vote-grid">
                <button class="btn-multi" onclick="boostVote(5)">+5</button>
                <button class="btn-multi" onclick="boostVote(10)">+10</button>
                <button class="btn-multi" onclick="boostVote(25)">+25</button>
                <button class="btn-multi" onclick="boostVote(50)">+50</button>
                <button class="btn-multi" onclick="boostVote(100)">+100</button>
                <button class="btn-multi" onclick="boostVote(500)">+500</button>
            </div>
        </div>
    </div>

    <script>
        let currentActiveBox = '';

        function changeVideo(videoId, boxId, candidateName) {
            currentActiveBox = boxId;
            
            // Chanje videyo
            const mainFrame = document.getElementById('main-video-frame');
            mainFrame.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&loop=1&playlist=${videoId}`;

            // Mete non kandida a
            document.getElementById('current-candidate-name').innerText = candidateName;

            // Jere klas "active" la
            document.querySelectorAll('.candidate-box').forEach(b => b.classList.remove('active'));
            document.getElementById(boxId).classList.add('active');

            // Afiche panel vòt la
            togglePanel(true);
        }

        function togglePanel(show) {
            const panel = document.getElementById('vote-panel');
            panel.style.display = show ? 'flex' : 'none';
        }

        function boostVote(amount) {
            if(!currentActiveBox) return;
            const scoreId = currentActiveBox === 'box-1' ? 'score-1' : 'score-2';
            const scoreEl = document.getElementById(scoreId);
            let currentScore = parseInt(scoreEl.innerText);
            scoreEl.innerText = currentScore + amount;
            
            scoreEl.style.color = "#ff0050";
            setTimeout(() => scoreEl.style.color = "#00f2ea", 300);
        }

        function updateClock() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('en-GB'); 
            const timeStr = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('current-date-time').innerText = `${dateStr} — ${timeStr}`;
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
